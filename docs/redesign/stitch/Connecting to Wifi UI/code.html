<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TACTICAL_NET_OS - Network Connection</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#a98a7d",
                        "error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#005313",
                        "on-surface-variant": "#e2bfb0",
                        "primary-fixed-dim": "#ffb693",
                        "on-secondary-fixed": "#001e2f",
                        "tertiary-fixed-dim": "#78dc77",
                        "secondary": "#8ccdff",
                        "on-secondary-fixed-variant": "#004b6f",
                        "on-primary-fixed-variant": "#7a3000",
                        "tertiary-container": "#4aad4e",
                        "surface-tint": "#ffb693",
                        "inverse-on-surface": "#303031",
                        "tertiary-fixed": "#94f990",
                        "background": "#131314",
                        "surface-container-highest": "#353436",
                        "on-primary-fixed": "#351000",
                        "error": "#ffb4ab",
                        "on-primary-container": "#572000",
                        "surface-bright": "#39393a",
                        "surface-container-low": "#1b1b1c",
                        "surface": "#131314",
                        "on-tertiary-container": "#003a0b",
                        "inverse-surface": "#e5e2e3",
                        "surface-dim": "#131314",
                        "primary": "#ffb693",
                        "secondary-fixed": "#cae6ff",
                        "on-background": "#e5e2e3",
                        "inverse-primary": "#a04100",
                        "on-tertiary": "#00390a",
                        "on-primary": "#561f00",
                        "on-secondary-container": "#002d44",
                        "surface-variant": "#353436",
                        "outline-variant": "#5a4136",
                        "on-surface": "#e5e2e3",
                        "primary-fixed": "#ffdbcc",
                        "on-error-container": "#ffdad6",
                        "on-tertiary-fixed": "#002204",
                        "surface-container-high": "#2a2a2b",
                        "secondary-fixed-dim": "#8ccdff",
                        "secondary-container": "#2899d8",
                        "on-error": "#690005",
                        "tertiary": "#78dc77",
                        "surface-container-lowest": "#0e0e0f",
                        "on-secondary": "#00344e",
                        "primary-container": "#ff6b00",
                        "surface-container": "#1f1f20"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .kb-key {
            @apply flex items-center justify-center bg-surface-container-highest text-on-surface font-headline text-lg rounded-xl active:bg-primary active:text-on-primary transition-all duration-75 select-none;
            height: 48px;
        }
        .kb-key-wide { @apply col-span-2; }
        .kb-key-action { @apply bg-surface-bright border border-white/5; }
    </style>
</head>
<body class="bg-background text-on-background font-body overflow-hidden h-screen w-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#131314]/90 backdrop-blur-md flex justify-between items-center w-full px-6 h-16 border-b border-white/5 fixed top-0 z-50 shadow-[0_4px_24px_rgba(255,107,0,0.12)]">
<div class="flex items-center gap-4">
<span class="text-xl font-black text-[#FF6B00] tracking-widest font-['Space_Grotesk'] uppercase">TACTICAL_NET_OS</span>
<div class="h-4 w-[1px] bg-white/10"></div>
<span class="text-[#39393A] font-['Space_Grotesk'] tracking-tighter uppercase font-bold text-sm">NODE_01 // SECURE_ENTRY</span>
</div>
<div class="flex items-center gap-6">
<span class="material-symbols-outlined text-[#39393A]">wifi</span>
<span class="material-symbols-outlined text-[#39393A]">battery_full</span>
<span class="material-symbols-outlined text-[#FF6B00]">settings</span>
</div>
</header>
<!-- SideNavBar (Suppressed for focused task) -->
<!-- Main Content Canvas -->
<main class="flex-1 flex items-center justify-center pt-16 p-4 bg-surface relative overflow-hidden">
<!-- Rugged Background Aesthetic -->
<div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCM76uEYXqstVEVx1KGHsycPxAcAt6NBRR9KnBPeksVuwbW2QigimLr7qSjtVWdK133UeTovk3Q85AWwCCQKgISz16Zp4qpTmhw4OzZpifcTXoVc5FPa7kytxGEZdk4UL5vHUz9ceUaFu94_ETAIHXWP_8oeYG90doY0_wDJNx7oQ7cNcjaIk3pG3WsgSeOjioIcKyySS-ttJKxjRjxysY2PxDdCt2_Uze1wvbZjx4INhuf5GG8rESpS90__YSCGKY651IEF3xhCqo');"></div>
<!-- Focused Connection Modal -->
<div class="w-full max-w-4xl bg-surface-container-low rounded-xl flex flex-col shadow-2xl relative z-10 overflow-hidden border border-white/5">
<!-- Header Section -->
<div class="p-6 flex justify-between items-start">
<div>
<h1 class="font-headline text-2xl font-bold tracking-tight text-on-surface uppercase">Connect to Network</h1>
<div class="mt-2 flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-secondary shadow-[0_0_8px_#8ccdff]"></span>
<span class="font-label text-sm font-semibold text-secondary tracking-widest uppercase">Deep_Field_Secure</span>
</div>
</div>
<button class="w-12 h-12 flex items-center justify-center bg-surface-container-high rounded-lg text-on-surface-variant active:scale-95 duration-150">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Input Section -->
<div class="px-6 pb-4">
<div class="relative">
<label class="block font-label text-[10px] font-bold text-outline uppercase tracking-[0.2em] mb-2 px-1">Network Password</label>
<div class="flex gap-3">
<div class="relative flex-1">
<input class="w-full h-14 bg-surface-container-lowest border-none rounded-xl px-4 font-headline text-xl text-primary tracking-widest focus:ring-2 focus:ring-primary/40 transition-all placeholder:text-surface-container-highest" placeholder="••••••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-surface-bright hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
</div>
</div>
<!-- Virtual Keyboard (Optimized for 3.5" Touch) -->
<div class="px-6 py-4 bg-surface-container-high/50 backdrop-blur-sm grid grid-cols-10 gap-2 select-none">
<!-- Row 1 -->
<button class="kb-key">Q</button>
<button class="kb-key">W</button>
<button class="kb-key">E</button>
<button class="kb-key">R</button>
<button class="kb-key">T</button>
<button class="kb-key">Y</button>
<button class="kb-key">U</button>
<button class="kb-key">I</button>
<button class="kb-key">O</button>
<button class="kb-key">P</button>
<!-- Row 2 -->
<div class="col-span-full grid grid-cols-[0.5fr_repeat(9,1fr)_0.5fr] gap-2">
<div></div>
<button class="kb-key">A</button>
<button class="kb-key">S</button>
<button class="kb-key">D</button>
<button class="kb-key">F</button>
<button class="kb-key">G</button>
<button class="kb-key">H</button>
<button class="kb-key">J</button>
<button class="kb-key">K</button>
<button class="kb-key">L</button>
<div></div>
</div>
<!-- Row 3 -->
<button class="kb-key kb-key-wide kb-key-action">
<span class="material-symbols-outlined" data-weight="fill">shift</span>
</button>
<button class="kb-key">Z</button>
<button class="kb-key">X</button>
<button class="kb-key">C</button>
<button class="kb-key">V</button>
<button class="kb-key">B</button>
<button class="kb-key">N</button>
<button class="kb-key">M</button>
<button class="kb-key kb-key-wide kb-key-action">
<span class="material-symbols-outlined">backspace</span>
</button>
<!-- Row 4 -->
<button class="kb-key kb-key-action">123</button>
<button class="kb-key">@</button>
<button class="kb-key col-span-6">SPACE</button>
<button class="kb-key">.</button>
<button class="kb-key kb-key-action">
<span class="material-symbols-outlined">keyboard_hide</span>
</button>
</div>
<!-- Modal Actions -->
<div class="p-6 flex gap-4 bg-surface-container-low">
<button class="flex-1 h-16 rounded-xl bg-surface-container-highest text-on-surface font-headline font-bold uppercase tracking-widest active:scale-95 transition-all">
                    Cancel
                </button>
<button class="flex-[2] h-16 rounded-xl bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold uppercase tracking-[0.2em] shadow-[0_0_20px_rgba(255,107,0,0.3)] active:scale-95 transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">bolt</span>
                    Connect
                </button>
</div>
</div>
<!-- Decorative Elements -->
<div class="absolute bottom-4 right-6 flex items-center gap-2 opacity-30">
<span class="label-sm font-label text-[10px] tracking-tighter">ENCRYPTION_AES256</span>
<div class="w-1 h-1 bg-secondary rounded-full"></div>
<span class="label-sm font-label text-[10px] tracking-tighter">HARDWARE_VER_4.2</span>
</div>
</main>
<!-- FAB Suppression (Per Instructions) -->
</body></html>
